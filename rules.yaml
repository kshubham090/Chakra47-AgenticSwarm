# Symbolic rule engine configuration.
# All thresholds live here — never hardcode them in agent code.
# Rules are evaluated in ascending priority order; first match wins.
# Supported actions: PASS, BLOCK, ESCALATE
# Supported operators: >, <, >=, <=, ==, !=

rule_engine:
  rules:
    - id: block_critical_risk
      condition: "risk_score > 0.8"
      action: BLOCK
      priority: 1
      reason: "Risk score exceeds critical threshold"

    - id: escalate_elevated_risk
      condition: "risk_score > 0.5"
      action: ESCALATE
      priority: 2
      reason: "Risk score requires human review before proceeding"

    - id: block_forbidden_action
      condition: "action == delete"
      action: BLOCK
      priority: 3
      reason: "Delete actions are forbidden without an explicit override"

    - id: pass_low_risk
      condition: "risk_score <= 0.5"
      action: PASS
      priority: 10
      reason: "Risk score is within acceptable bounds"

resource_monitor:
  cpu_critical: 95.0
  cpu_elevated: 80.0
  memory_critical: 90.0
  memory_elevated: 75.0
  disk_critical: 95.0
  disk_elevated: 85.0

anomaly_detector:
  z_score_threshold: 2.5
  severe_z_score_threshold: 4.0

risk_agent:
  critical_threshold: 0.8
  elevated_threshold: 0.5
  weights:
    risk_score: 1.0
    severity: 0.5
    confidence: -0.3

context_analyst:
  history_window: 10
  critical_failure_rate: 0.7
  elevated_failure_rate: 0.4

mission_planner:
  known_types:
    - patrol
    - deliver
    - inspect
    - report
    - standby
    - monitor
    - scan
    - alert

path_planner:
  min_waypoints: 2
  max_waypoints: 50

comms_agent:
  valid_targets:
    - orchestrator
    - audit_agent
    - mission_planner
    - risk_agent
    - resource_monitor
    - anomaly_detector
    - human_operator

override_handler:
  valid_keys:
    - OVERRIDE_ALPHA
    - OVERRIDE_BETA
    - OVERRIDE_GAMMA

sensor_fusion:
  # conflict_threshold: moderate disagreement — sensors differ but all are plausible → ESCALATE
  # outlier_threshold:  extreme deviation — one sensor is rogue/broken, fused mean unreliable → BLOCK
  # outlier_threshold must be strictly greater than conflict_threshold
  conflict_threshold: 15.0
  outlier_threshold: 20.0
